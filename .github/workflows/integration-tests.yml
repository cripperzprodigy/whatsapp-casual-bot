name: Integration Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn httpx[http2] pydantic pydantic-settings sqlalchemy python-dotenv openai slowapi pytest pytest-asyncio filelock duckduckgo-search aiohttp beautifulsoup4 lxml defusedxml pillow
        
    - name: Run Integration Tests
      run: |
        pytest tests/integration/
